name: Lint, Test & Secrets Scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks が git 履歴を走査するためフル取得
          fetch-depth: 0

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: just sync

      - name: Run checks
        run: just check

      - name: Cache pre-commit hooks
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      # gitleaks は pre-commit 経由で実行。.pre-commit-config.yaml の rev が真実となり
      # ローカル commit 時と CI で同じバージョン・allowlist が走る。
      - name: Run pre-commit (gitleaks)
        run: uv run pre-commit run --all-files
